name: Playwright CI (Test Runner)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  self-heal:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: false
          cache: npm

      - name: Environment fingerprint
        run: |
          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"
          echo "OS: $(uname -a)"
          echo "Runner: $RUNNER_OS"

      - name: CI sanity check
        run: |
          if [ -z "$(node -v)" ]; then
            echo "Node missing"
            exit 1
          fi

          if [ ! -f package-lock.json ]; then
            echo "Lockfile missing"
            exit 1
          fi

      - name: Install dependencies (locked)
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: test
        run: |
          set +e
          npx playwright test
          EXIT_CODE=$?

          echo "EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV

          if [ $EXIT_CODE -ne 0 ]; then
            echo "TEST_FAILED=true" >> $GITHUB_ENV
          fi

          echo "TEST_FAILED=$TEST_FAILED"
          exit 0

      - name: AI environment guard
        run: |
          echo "Validating AI runtime..."

          test -f package-lock.json || exit 1
          node -v || exit 1

          echo "AI environment OK"

      - name: Run AI Self-Heal Agent
        if: env.TEST_FAILED == 'true'
        env:
          FUELIX_API_KEY: ${{ secrets.FUELIX_API_KEY }}
        run: node ai-fix.js

      - name: Commit and push fixes
        if: env.TEST_FAILED == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          # HARD LOCK: only allow this branch
          BRANCH="ai-fix"

          # Safety check: prevent accidental nested branches
          if [[ "$BRANCH" == *"/"* ]]; then
            echo "ERROR: Nested branch names are forbidden"
            exit 1
          fi

          echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

          git fetch origin

          git checkout $BRANCH || git checkout -b $BRANCH

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "AI self-heal CI fix"

          git push -u origin $BRANCH

      - name: Verify GitHub CLI
        run: gh --version

      - name: Create or Update Pull Request
        if: env.TEST_FAILED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$BRANCH_NAME

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            echo "No PR found. Creating new PR..."

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "AI Self-Healing Fix" \
              --body "Automated fix generated by AI Self-Healing CI"

          else
            echo "PR already exists: #$EXISTING_PR"
            echo "No need to create a new one. Updates will appear automatically from new commits."
          fi
