name: AI Self-Healing CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  self-heal:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: test
        run: |
          set +e
          npx playwright test
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "TEST_FAILED=true" >> $GITHUB_ENV
          fi

          exit 0

      - name: Run AI Self-Heal Agent
        if: env.TEST_FAILED == 'true'
        env:
          FUELIX_API_KEY: ${{ secrets.FUELIX_API_KEY }}
        run: node ai-fix.js

      - name: Commit and push fixes
        if: env.TEST_FAILED == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          BRANCH="ai-fix/main"

          echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

          git checkout -b $BRANCH || git checkout $BRANCH

          git add .

          git commit -m "AI self-heal CI fix" || echo "No changes"

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git $BRANCH

      - name: Setup GitHub CLI auth
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create or Update Pull Request
        if: env.TEST_FAILED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$BRANCH_NAME

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            echo "No PR found. Creating new PR..."

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "AI Self-Healing Fix" \
              --body "Automated fix generated by AI Self-Healing CI"

          else
            echo "PR already exists: #$EXISTING_PR"
            echo "No need to create a new one. Updates will appear automatically from new commits."
          fi
