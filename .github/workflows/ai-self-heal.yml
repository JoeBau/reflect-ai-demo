name: AI Self-Healing Engine (Dispatcher)

on:
  repository_dispatch:
    types: [ai-self-heal]

permissions:
  contents: write

jobs:
  self-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Clean git ref state
        run: |
          git fetch --prune origin
          git update-ref -d refs/heads/ai-fix/run-1 2>/dev/null || true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run AI Self-Heal Agent
        env:
          FUELIX_API_KEY: ${{ secrets.FUELIX_API_KEY }}
        run: node ai-fix.js

      - name: Commit and push fixes
        run: |

          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git fetch origin --prune

          # HARD RESET local state
          git branch -D ai-fix 2>/dev/null || true

          # FORCE single-branch model
          git checkout -B ai-fix

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "AI self-heal fix" || exit 0

          # IMPORTANT: no force push
          git push origin ai-fix
