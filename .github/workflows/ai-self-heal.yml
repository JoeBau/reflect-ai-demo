name: AI Self-Healing Engine (Dispatcher)

on:
  repository_dispatch:
    types: [ai-self-heal]

permissions:
  contents: write

jobs:
  self-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Harden git ref namespace (critical fix)
        run: |
          git config core.logallrefupdates false
          git fetch origin --prune

          # Flatten any ai-fix namespace refs
          git for-each-ref --format="%(refname)" | grep "refs/heads/ai-fix/" || true

          # Force delete ANY hierarchical refs
          rm -rf .git/refs/heads/ai-fix || true

      - name: Checkout repository (clean)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run AI Self-Heal Agent
        env:
          FUELIX_API_KEY: ${{ secrets.FUELIX_API_KEY }}
        run: node ai-fix.js

      - name: Commit and push fixes
        run: |

          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git fetch origin --prune

          # CRITICAL: reinitialize ref safely
          rm -rf .git/refs/heads/ai-fix || true

          git checkout -B ai-fix

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "AI self-heal fix" || exit 0

          git push origin ai-fix
