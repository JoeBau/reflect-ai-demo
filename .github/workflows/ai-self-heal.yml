name: AI Self-Healing CI

on:
  repository_dispatch:
    types: [ai-self-heal]

permissions:
  contents: write

jobs:
  self-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run AI Self-Heal Agent
        env:
          FUELIX_API_KEY: ${{ secrets.FUELIX_API_KEY }}
        run: node ai-fix.js

      - name: Commit and push fixes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git checkout ai-fix || git checkout -b ai-fix

          git add .
          git commit -m "AI self-heal fix" || echo "No changes"

          git push origin ai-fix
