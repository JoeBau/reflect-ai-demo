name: AI Self-Healing Engine (Dispatcher)

on:
  repository_dispatch:
    types: [ai-self-heal]

permissions:
  contents: write

jobs:
  self-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (clean)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run AI Self-Heal Agent
        env:
          FUELIX_API_KEY: ${{ secrets.FUELIX_API_KEY }}
        run: node ai-fix.js

      - name: Commit and push fixes
        run: |

          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git fetch origin --prune

          # HARD reset local branch state
          git show-ref | grep ai-fix || true

          # FORCE clean branch recreation (this is key)
          git branch -D ai-fix 2>/dev/null || true
          git checkout -b ai-fix

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "AI self-heal fix" || exit 0

          git push origin ai-fix
